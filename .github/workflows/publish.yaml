name: Publish pyincusd

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  workflow_dispatch: {} # manual trigger

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
      publish_version: ${{ steps.check.outputs.publish_version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check for new Incus release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Latest incus release tag (authenticated to avoid rate limits)
          TAG=$(curl -sf -H "Authorization: bearer ${GH_TOKEN}" \
            https://api.github.com/repos/lxc/incus/releases/latest | jq -r '.tag_name')
          VERSION="${TAG#v}"

          # Guard: if we couldn't get a version, bail
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "ERROR: could not determine latest Incus release."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # What's currently on PyPI? (404 = never published)
          # Extract just the base version (strip .postN suffix for comparison)
          PYPI_RAW=$(curl -sf https://pypi.org/pypi/pyincusd/json | jq -r '.info.version' 2>/dev/null || echo "")
          PYPI_BASE=$(echo "$PYPI_RAW" | sed 's/\.post[0-9]*$//')

          echo "incus latest: ${VERSION}"
          echo "pypi current: ${PYPI_RAW:-none} (base: ${PYPI_BASE:-none})"

          if [ "$VERSION" != "$PYPI_BASE" ]; then
            echo "New release detected."
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already up to date."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi

          # Determine publish version — if the base version filename was
          # previously burned on PyPI, auto-increment to .postN
          PUBLISH_VERSION="$VERSION"
          PYPI_PROJECT=$(curl -sf https://pypi.org/pypi/pyincusd/json 2>/dev/null || echo "")
          if [ -n "$PYPI_PROJECT" ]; then
            # Project exists — get ALL released versions and check for conflicts
            ALL_VERSIONS=$(echo "$PYPI_PROJECT" | jq -r '.releases | keys[]')
          else
            ALL_VERSIONS=""
          fi

          # Also check the Simple API for burned filenames (survives project deletion)
          SIMPLE_PAGE=$(curl -sf https://pypi.org/simple/pyincusd/ 2>/dev/null || echo "")

          # Check if the bare version filename exists (current or burned)
          if echo "$SIMPLE_PAGE" | grep -q "pyincusd-${VERSION}-" || \
             echo "$ALL_VERSIONS" | grep -qx "$VERSION"; then
            # Bare version is taken — find the next available .postN
            N=1
            while true; do
              CANDIDATE="${VERSION}.post${N}"
              if ! echo "$SIMPLE_PAGE" | grep -q "pyincusd-${CANDIDATE}-" && \
                 ! echo "$ALL_VERSIONS" | grep -qx "$CANDIDATE"; then
                PUBLISH_VERSION="$CANDIDATE"
                break
              fi
              N=$((N + 1))
              if [ "$N" -gt 100 ]; then
                echo "ERROR: could not find available .postN after 100 attempts"
                echo "new_release=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
            echo "Base version burned. Publishing as ${PUBLISH_VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_version=${PUBLISH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write # for committing README + creating releases
      id-token: write # for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch Incus Swagger spec for ${{ needs.check-release.outputs.tag }}
        run: |
          curl -fsSL -o rest-api.yaml \
            "https://raw.githubusercontent.com/lxc/incus/${{ needs.check-release.outputs.tag }}/doc/rest-api.yaml"

      - name: Generate Python client via OpenAPI Generator
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            openapitools/openapi-generator-cli:latest generate \
            -i /work/rest-api.yaml \
            -g python \
            -o /work/pyincusd \
            --skip-validate-spec \
            --additional-properties=packageName=pyincusd \
            --additional-properties=packageVersion=${{ needs.check-release.outputs.publish_version }} \
            --additional-properties=projectName=pyincusd \
            --git-user-id=anonhostpi \
            --git-repo-id=pyincusd
          # Docker creates files as root — fix ownership for subsequent steps
          sudo chown -R "$(id -u):$(id -g)" pyincusd/

      - name: Fix generated docs
        run: |
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          VERSION="${{ needs.check-release.outputs.version }}"
          BASE="https://github.com/anonhostpi/pyincusd/blob/v${VERSION}"

          # Fix pip install: replace git+https block with simple pip install
          sed -i '/### pip install/,/```$/{
            /### pip install/!{
              /```$/!d
            }
          }' pyincusd/README.md
          sed -i 's|### pip install|### pip install\n\n```sh\npip install pyincusd\n```|' pyincusd/README.md

          # Fix README links: docs/Foo.md → absolute GitHub URL at the release tag
          sed -i "s|(docs/|(${BASE}/docs/|g" pyincusd/README.md
          sed -i "s|(pyincusd/|(${BASE}/pyincusd/|g" pyincusd/README.md

          # Fix cross-references inside docs/: (Foo.md → absolute at docs/ level
          for f in pyincusd/docs/*.md; do
            sed -i "s|(\([A-Z][A-Za-z0-9_]*\.md\)|(${BASE}/docs/\1|g" "$f"
            sed -i "s|(../pyincusd/|(${BASE}/pyincusd/|g" "$f"
          done

      - name: Patch generated pyproject.toml
        run: |
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          VERSION="${{ needs.check-release.outputs.version }}"
          cat > pyincusd/pyproject.toml << 'TOML'
          [project]
          name = "pyincusd"
          version = "VERSION_PLACEHOLDER"
          description = "Auto-generated Python client for the Incus daemon REST API"
          readme = "README.md"
          license = {text = "Apache-2.0"}
          requires-python = ">=3.8"
          dependencies = [
              "urllib3>=1.25.3",
              "python-dateutil>=2.8.2",
              "pydantic>=2",
              "typing-extensions>=4.7.1",
          ]

          [project.urls]
          Homepage = "https://github.com/anonhostpi/pyincusd"
          "Incus Docs" = "https://linuxcontainers.org/incus/docs/main/rest-api/"
          "Source Spec" = "https://github.com/lxc/incus/blob/main/doc/rest-api.yaml"

          [build-system]
          requires = ["setuptools>=68"]
          build-backend = "setuptools.build_meta"
          TOML
          sed -i 's/^          //' pyincusd/pyproject.toml
          sed -i "s/VERSION_PLACEHOLDER/${PUBLISH_VERSION}/" pyincusd/pyproject.toml

      - name: Build wheel + sdist
        run: |
          pip install build
          cd pyincusd
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: pyincusd/dist/

      - name: Commit generated package + docs to repo
        run: |
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          VERSION="${{ needs.check-release.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Remove old generated files (clean slate per version)
          git rm -rf --ignore-unmatch docs/ pyincusd/ 2>/dev/null || true

          # Copy generated output into the repo root
          # (the generator outputs to pyincusd/ — move contents up)
          cp -r pyincusd/docs docs
          cp -r pyincusd/pyincusd pyincusd
          cp pyincusd/README.md README.md

          git add docs/ pyincusd/ README.md
          git diff --cached --quiet || git commit -m "pyincusd ${PUBLISH_VERSION}"
          git push
          git pull --ff-only

      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="${{ needs.check-release.outputs.tag }}"

          WHEEL=$(ls pyincusd/dist/*.whl)
          SDIST=$(ls pyincusd/dist/*.tar.gz)

          gh release create "v${PUBLISH_VERSION}" \
            --title "pyincusd ${PUBLISH_VERSION}" \
            --notes "Auto-generated Python client for Incus ${VERSION}.

          Built from [\`lxc/incus@${TAG}\`](https://github.com/lxc/incus/tree/${TAG}) Swagger spec.

          Install: \`pip install pyincusd==${PUBLISH_VERSION}\`

          PyPI: https://pypi.org/project/pyincusd/${PUBLISH_VERSION}/" \
            "${WHEEL}" \
            "${SDIST}"

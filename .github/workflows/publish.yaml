name: Publish pyincusd

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  workflow_dispatch: {} # manual trigger

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check for new Incus release
        id: check
        run: |
          # Latest incus release tag (e.g. "v6.19.1")
          TAG=$(curl -sf https://api.github.com/repos/lxc/incus/releases/latest | jq -r '.tag_name')
          VERSION="${TAG#v}"

          # What's currently on PyPI? (404 = never published)
          PYPI_VERSION=$(curl -sf https://pypi.org/pypi/pyincusd/json | jq -r '.info.version' 2>/dev/null || echo "")

          echo "incus latest: ${VERSION}"
          echo "pypi current: ${PYPI_VERSION:-none}"

          if [ "$VERSION" != "$PYPI_VERSION" ]; then
            echo "New release detected."
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Already up to date."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write # for committing README + creating releases
      id-token: write # for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch Incus Swagger spec for ${{ needs.check-release.outputs.tag }}
        run: |
          curl -fsSL -o rest-api.yaml \
            "https://raw.githubusercontent.com/lxc/incus/${{ needs.check-release.outputs.tag }}/doc/rest-api.yaml"

      - name: Generate Python client via OpenAPI Generator
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            openapitools/openapi-generator-cli:latest generate \
            -i /work/rest-api.yaml \
            -g python \
            -o /work/pyincusd \
            --skip-validate-spec \
            --additional-properties=packageName=pyincusd \
            --additional-properties=packageVersion=${{ needs.check-release.outputs.version }} \
            --additional-properties=projectName=pyincusd

      - name: Patch generated pyproject.toml
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          cat > pyincusd/pyproject.toml << 'TOML'
          [project]
          name = "pyincusd"
          version = "VERSION_PLACEHOLDER"
          description = "Auto-generated Python client for the Incus daemon REST API"
          readme = "README.md"
          license = {text = "Apache-2.0"}
          requires-python = ">=3.8"
          dependencies = [
              "urllib3>=1.25.3",
              "python-dateutil>=2.8.2",
              "pydantic>=2",
              "typing-extensions>=4.7.1",
          ]

          [project.urls]
          Homepage = "https://github.com/anonhostpi/pyincusd"
          "Incus Docs" = "https://linuxcontainers.org/incus/docs/main/rest-api/"
          "Source Spec" = "https://github.com/lxc/incus/blob/main/doc/rest-api.yaml"

          [build-system]
          requires = ["setuptools>=68"]
          build-backend = "setuptools.build_meta"
          TOML
          sed -i 's/^          //' pyincusd/pyproject.toml
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" pyincusd/pyproject.toml

      - name: Build wheel + sdist
        run: |
          pip install build
          cd pyincusd
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: pyincusd/dist/

      - name: Update repo README with latest version
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="${{ needs.check-release.outputs.tag }}"
          cat > README.md << EOF
          # pyincusd

          [![PyPI version](https://img.shields.io/pypi/v/pyincusd)](https://pypi.org/project/pyincusd/)
          [![Incus version](https://img.shields.io/badge/incus-${VERSION}-blue)](https://github.com/lxc/incus/releases/tag/${TAG})

          Auto-generated Python client for the [Incus](https://linuxcontainers.org/incus/) daemon REST API.

          **Latest: ${VERSION}** — generated from [\`lxc/incus@${TAG}\`](https://github.com/lxc/incus/tree/${TAG})

          ## Install

          \`\`\`bash
          pip install pyincusd
          \`\`\`

          ## Usage

          \`\`\`python
          import pyincusd
          from pyincusd.api import instances_api

          config = pyincusd.Configuration()
          config.host = "http+unix://%2Frun%2Fincus%2Funix.socket"

          with pyincusd.ApiClient(config) as client:
              api = instances_api.InstancesApi(client)
              instances = api.instances_get()
          \`\`\`

          ## How it works

          A [GitHub Actions workflow](.github/workflows/publish.yaml) runs every night:
          1. Checks the latest [lxc/incus](https://github.com/lxc/incus/releases) release
          2. Compares against what's on PyPI
          3. If new: generates a typed Python client via [OpenAPI Generator](https://openapi-generator.tech/), publishes to PyPI

          ## PyPI trusted publishing setup

          First publish requires configuring [trusted publishing](https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/):
          1. Go to https://pypi.org/manage/account/publishing/
          2. Add pending publisher: owner=\`anonhostpi\`, repo=\`pyincusd\`, workflow=\`publish.yaml\`, environment=\`pypi\`
          EOF
          sed -i 's/^          //' README.md

      - name: Commit + push README update
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "pyincusd ${VERSION}"
          git push
          # gh release tags the current HEAD — make sure we're on the
          # commit that includes the updated README
          git pull --ff-only

      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="${{ needs.check-release.outputs.tag }}"

          # Collect the wheel and sdist
          WHEEL=$(ls pyincusd/dist/*.whl)
          SDIST=$(ls pyincusd/dist/*.tar.gz)

          gh release create "v${VERSION}" \
            --title "pyincusd ${VERSION}" \
            --notes "Auto-generated Python client for Incus ${VERSION}.

          Built from [\`lxc/incus@${TAG}\`](https://github.com/lxc/incus/tree/${TAG}) Swagger spec.

          Install: \`pip install pyincusd==${VERSION}\`

          PyPI: https://pypi.org/project/pyincusd/${VERSION}/" \
            "${WHEEL}" \
            "${SDIST}"

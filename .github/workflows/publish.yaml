name: Publish pyincusd

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Publish even if the upstream Incus version hasn't changed (bumps .postN)"
        type: boolean
        default: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      version: ${{ steps.check.outputs.version }}
      publish_version: ${{ steps.check.outputs.publish_version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Check for new Incus release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Latest incus release tag
          TAG=$(curl -sf -H "Authorization: bearer ${GH_TOKEN}" \
            https://api.github.com/repos/lxc/incus/releases/latest | jq -r '.tag_name')
          VERSION="${TAG#v}"

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "ERROR: could not determine latest Incus release."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compare against PyPI (strip .postN for base comparison)
          PYPI_RAW=$(curl -sf https://pypi.org/pypi/pyincusd/json | jq -r '.info.version' 2>/dev/null || echo "")
          PYPI_BASE=$(echo "$PYPI_RAW" | sed 's/\.post[0-9]*$//')

          echo "incus latest: ${VERSION}"
          echo "pypi current: ${PYPI_RAW:-none} (base: ${PYPI_BASE:-none})"

          PUBLISH_VERSION="$VERSION"
          FORCE="${{ github.event.inputs.force || 'false' }}"

          if [ "$VERSION" = "$PYPI_BASE" ] && [ "$FORCE" != "true" ]; then
            echo "Already up to date and force=false — skipping publish."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          else
            # Either a new upstream release or a forced republish (e.g. after
            # updating patches). Bump .postN past any existing git tag so the
            # PyPI filename is fresh.
            N=1
            while git tag -l "v${PUBLISH_VERSION}" | grep -q .; do
              PUBLISH_VERSION="${VERSION}.post${N}"
              N=$((N + 1))
            done
            if [ "$PUBLISH_VERSION" != "$VERSION" ]; then
              echo "Tag v${VERSION} exists — using ${PUBLISH_VERSION}"
            fi
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_version=${PUBLISH_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-and-publish:
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch Incus Swagger spec for ${{ needs.check-release.outputs.tag }}
        run: |
          curl -fsSL -o rest-api.yaml \
            "https://raw.githubusercontent.com/lxc/incus/${{ needs.check-release.outputs.tag }}/doc/rest-api.yaml"

      - name: Fix missing path parameters in Swagger spec
        run: |
          pip install pyyaml
          python patches/fix_spec.py rest-api.yaml rest-api.yaml

      - name: Generate Python client via OpenAPI Generator
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            openapitools/openapi-generator-cli:latest generate \
            -i /work/rest-api.yaml \
            -g python \
            -o /work/pyincusd \
            --skip-validate-spec \
            --additional-properties=packageName=pyincusd \
            --additional-properties=packageVersion=${{ needs.check-release.outputs.publish_version }} \
            --additional-properties=projectName=pyincusd \
            --additional-properties=library=httpx \
            --git-user-id=anonhostpi \
            --git-repo-id=pyincusd
          sudo chown -R "$(id -u):$(id -g)" pyincusd/

      - name: Add custom modules (local client + patches)
        run: |
          cp local.py pyincusd/pyincusd/local.py
          cp -r patches pyincusd/pyincusd/patches

      - name: Fix generated docs
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          BASE="https://github.com/anonhostpi/pyincusd/blob/v${PUBLISH_VERSION}"

          # Fix pip install — replace everything from "### pip install" to "### Setuptools"
          python3 << 'PYEOF'
          import re, pathlib
          p = pathlib.Path('pyincusd/README.md')
          text = p.read_text()
          text = re.sub(
              r'### pip install.*?(?=### Setuptools)',
              '### pip install\n\n```sh\npip install pyincusd\n```\n\n',
              text, flags=re.DOTALL)
          p.write_text(text)
          PYEOF

          # Fix "All URIs are relative to http://localhost" → point to incusd unix socket docs
          sed -i 's|All URIs are relative to \*http://localhost\*|All URIs are relative to the incusd API (unix socket or https). See [Incus REST API docs](https://linuxcontainers.org/incus/docs/main/rest-api/).|g' pyincusd/README.md pyincusd/docs/*.md

          # Fix README links to absolute blob/<tag> URLs
          sed -i "s|(docs/|(${BASE}/docs/|g" pyincusd/README.md
          sed -i "s|(pyincusd/|(${BASE}/src/pyincusd/|g" pyincusd/README.md

          # Fix cross-references inside docs/
          for f in pyincusd/docs/*.md; do
            sed -i "s|(\([A-Z][A-Za-z0-9_]*\.md\)|(${BASE}/docs/\1|g" "$f"
            sed -i "s|(../pyincusd/|(${BASE}/src/pyincusd/|g" "$f"
          done

          # Fix author section
          sed -i 's|lxc-devel@lists.linuxcontainers.org|API originally authored by [LXC](https://linuxcontainers.org/incus/), Python client auto-generated by [anonhostpi](https://github.com/anonhostpi)|g' pyincusd/README.md

          # Append custom docs (local client + patches)
          cat ADDENDUM.md >> pyincusd/README.md

      - name: Patch generated pyproject.toml
        run: |
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          cat > pyincusd/pyproject.toml << 'TOML'
          [project]
          name = "pyincusd"
          version = "VERSION_PLACEHOLDER"
          description = "Auto-generated Python client for the Incus daemon REST API"
          readme = "README.md"
          license = {text = "Apache-2.0"}
          requires-python = ">=3.8"
          dependencies = [
              "httpx>=0.20",
              "python-dateutil>=2.8.2",
              "pydantic>=2",
              "typing-extensions>=4.7.1",
              "pyyaml>=6",
          ]

          [project.urls]
          Homepage = "https://github.com/anonhostpi/pyincusd"
          "Incus Docs" = "https://linuxcontainers.org/incus/docs/main/rest-api/"
          "Source Spec" = "https://github.com/lxc/incus/blob/main/doc/rest-api.yaml"

          [tool.setuptools.packages.find]
          where = ["."]

          [build-system]
          requires = ["setuptools>=68"]
          build-backend = "setuptools.build_meta"
          TOML
          sed -i 's/^          //' pyincusd/pyproject.toml
          sed -i "s/VERSION_PLACEHOLDER/${PUBLISH_VERSION}/" pyincusd/pyproject.toml

      - name: Build wheel + sdist
        run: |
          pip install build
          cd pyincusd
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: pyincusd/dist/
          skip-existing: true

      - name: Commit generated package + docs to repo
        run: |
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # The generator outputs to pyincusd/ which contains:
          #   pyincusd/docs/      — API markdown docs
          #   pyincusd/pyincusd/  — the Python package source
          #   pyincusd/README.md  — generated README
          # Move them to the repo root, avoiding self-copy conflicts.
          git rm -rf --ignore-unmatch docs/ src/ 2>/dev/null || true

          # Stage docs and source under distinct names to avoid pyincusd/pyincusd overlap
          cp -r pyincusd/docs docs
          mkdir -p src
          cp -r pyincusd/pyincusd src/pyincusd
          cp pyincusd/README.md README.md

          git add docs/ src/ README.md
          git diff --cached --quiet || git commit -m "pyincusd ${PUBLISH_VERSION}"
          git push
          git pull --ff-only

      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PUBLISH_VERSION="${{ needs.check-release.outputs.publish_version }}"
          VERSION="${{ needs.check-release.outputs.version }}"
          TAG="${{ needs.check-release.outputs.tag }}"

          WHEEL=$(ls pyincusd/dist/*.whl)
          SDIST=$(ls pyincusd/dist/*.tar.gz)

          gh release create "v${PUBLISH_VERSION}" \
            --title "pyincusd ${PUBLISH_VERSION}" \
            --notes "Auto-generated Python client for Incus ${VERSION}.

          Built from [\`lxc/incus@${TAG}\`](https://github.com/lxc/incus/tree/${TAG}) Swagger spec.

          Install: \`pip install pyincusd==${PUBLISH_VERSION}\`

          PyPI: https://pypi.org/project/pyincusd/${PUBLISH_VERSION}/" \
            "${WHEEL}" \
            "${SDIST}"
